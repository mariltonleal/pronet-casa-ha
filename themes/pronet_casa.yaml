pronet_casa:
  # =============================================
  # TEMA PRONET CASA — Home Assistant
  # Manual da Marca ProNet Casa v1.0
  #
  # Paleta oficial
  #   Azul Principal  #0077FF  50 %
  #   Azul Escuro     #003A70  30 %
  #   Branco          #FFFFFF  10 %
  #   Azul Claro      #35BFFF   5 %
  #   Amarelo Quente  #FBB724   5 %
  #   Cinza Suave     #F2F7FA
  #
  # Tipografia: Nunito Sans
  # Visual: suave, fluido, organico
  # =============================================

  # --- Cores Primarias ---
  primary-color: "#0077FF"
  accent-color: "#FBB724"
  primary-background-color: "#F2F7FA"
  secondary-background-color: "#FFFFFF"

  # --- Barra Lateral (Sidebar) ---
  sidebar-background-color: "#003A70"
  sidebar-text-color: "#FFFFFF"
  sidebar-icon-color: "#35BFFF"
  sidebar-selected-background-color: "rgba(0,119,255,0.25)"
  sidebar-selected-icon-color: "#FFFFFF"
  sidebar-selected-text-color: "#FFFFFF"

  # --- Header / App Bar ---
  app-header-background-color: "#003A70"
  app-header-text-color: "#FFFFFF"

  # --- Cards ---
  card-background-color: "#FFFFFF"
  ha-card-background: "#FFFFFF"
  ha-card-border-radius: "16px"
  ha-card-border-width: "0px"
  ha-card-box-shadow: "0 2px 12px rgba(0,58,112,0.06)"

  # --- Texto ---
  primary-text-color: "#003A70"
  secondary-text-color: "#5A7A9A"
  text-primary-color: "#FFFFFF"
  disabled-text-color: "#A0B8D0"

  # --- Dividers ---
  divider-color: "#E3EDF7"

  # --- Switches e Toggles ---
  switch-checked-color: "#0077FF"
  switch-checked-button-color: "#FFFFFF"
  switch-checked-track-color: "#0077FF"
  switch-unchecked-color: "#A0B8D0"
  switch-unchecked-button-color: "#FFFFFF"
  switch-unchecked-track-color: "#D0DCE8"

  # --- Estados ---
  state-icon-color: "#0077FF"
  state-icon-active-color: "#FBB724"
  state-active-color: "#0077FF"

  # --- Inputs ---
  input-fill-color: "#F2F7FA"
  input-ink-color: "#003A70"
  input-label-ink-color: "#5A7A9A"
  input-idle-line-color: "#D0DCE8"
  input-hover-line-color: "#0077FF"
  input-disabled-fill-color: "#F2F7FA"
  input-disabled-ink-color: "#A0B8D0"
  input-disabled-line-color: "#D0DCE8"

  # --- Botoes / FAB ---
  mdc-theme-primary: "#0077FF"
  mdc-theme-secondary: "#FBB724"
  mdc-button-outline-color: "#0077FF"

  # --- Badges ---
  label-badge-background-color: "#0077FF"
  label-badge-text-color: "#FFFFFF"

  # --- Slider ---
  paper-slider-active-color: "#0077FF"
  paper-slider-knob-color: "#0077FF"
  paper-slider-container-color: "#D0DCE8"

  # --- Graficos ---
  graph-color: "#0077FF"

  # --- Scrollbar ---
  scrollbar-thumb-color: "rgba(0,119,255,0.3)"

  # --- Tipografia (Nunito Sans) ---
  primary-font-family: "'Nunito Sans', sans-serif"
  paper-font-common-base_-_font-family: "'Nunito Sans', sans-serif"
  paper-font-common-code_-_font-family: "'Nunito Sans', monospace"
  paper-font-body1_-_font-family: "'Nunito Sans', sans-serif"
  paper-font-subhead_-_font-family: "'Nunito Sans', sans-serif"
  paper-font-headline_-_font-family: "'Nunito Sans', sans-serif"
  paper-font-caption_-_font-family: "'Nunito Sans', sans-serif"
  paper-font-title_-_font-family: "'Nunito Sans', sans-serif"

  # --- Fundo geral ---
  lovelace-background: "#F2F7FA"

  # --- Barra de energia / progresso ---
  energy-grid-consumption-color: "#0077FF"
  energy-grid-return-color: "#35BFFF"
  energy-solar-color: "#FBB724"

# =================================================
